apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reducto
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/LijieZhou/reducto-helm
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
